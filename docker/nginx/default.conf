server {
    listen 80;
    server_name localhost;
    charset utf-8;
    client_max_body_size 200M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self';" always;

    # ── Uploaded files (Laravel public storage) ──
    location ^~ /storage/ {
        alias /var/www/html/public/storage/;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ── Laravel API ──────────────────────────────
    location ^~ /api {
        try_files $uri @laravel;
    }

    location ^~ /sanctum {
        try_files $uri @laravel;
    }

    location @laravel {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/html/public;
    }

    # ── Static frontend ──────────────────────────
    root /var/www/frontend;
    index index.html;

    # Partials доступні тільки через SSI subrequests, не напряму
    location ^~ /partials/ {
        internal;
    }

    location / {
        ssi on;
        try_files $uri $uri.html $uri/ =404;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
