services:

  # ── Laravel application (PHP-FPM) ──────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
      - ./backend-src:/backend-src:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/www/html/.bootstrap-complete && nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s
    networks: [borove]
    restart: unless-stopped

  # ── Nginx — frontend + API proxy ───────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/frontend:ro
    depends_on:
      app:
        condition: service_healthy
    networks: [borove]
    restart: unless-stopped

  # ── MySQL ──────────────────────────────────────
  db:
    image: mysql:8.0
    command: --require-secure-transport=OFF
    environment:
      MYSQL_DATABASE: borove
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: borove
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [borove]
    restart: unless-stopped

  # ── phpMyAdmin (optional) ──────────────────────
  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: borove
      PMA_PASSWORD: secret
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    networks: [borove]
    restart: unless-stopped

networks:
  borove:
    driver: bridge

volumes:
  db_data:
